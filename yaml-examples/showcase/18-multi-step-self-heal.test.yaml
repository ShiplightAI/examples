# 18 — Multi-Step Self-Healing
#
# Demonstrates a scenario where a single self-heal attempt isn't enough.
# The agent needs to: 1) click avatar to open dropdown, 2) click Settings.
# With maxSteps=1, if the initial locator fails, the agent gets one chance
# to find and click the element. If the dropdown needs to be opened first,
# that's already the one step used up.
#
# This test verifies that the agent can handle multi-step interactions
# like: open dropdown menu → click menu item → navigate to sub-section.

goal: Open user menu, navigate to Settings, then to Security tab
base_url: http://localhost:3000

statements:
  - URL: /testing/interactions/multi-step-interaction.html
  - WAIT_UNTIL: page loads

  # Step 1: Click avatar to open dropdown, then click Settings
  # This is a multi-step interaction — the dropdown must be opened first
  - intent: Click the Q avatar icon to open the user menu, then click Settings
    action: click
    timeout_ms: 10000

  - VERIFY: "The text 'Action: settings' is visible"

  # Step 2: Click on Security tab in the settings sidebar
  - intent: Click on the Security tab in the settings sidebar
    action: click

  - VERIFY: The heading Security is visible
