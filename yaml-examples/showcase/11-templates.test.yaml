# 11 — Templates (Reusable Steps)
#
# Demonstrates reusable step templates that can be shared across
# tests. Templates avoid duplicating common sequences like
# "search and click".
#
# Note: This test references a cloud template (reference_id: 42).
# For local usage, templates are defined in separate YAML files
# and included via `template: path/to/template.yaml`.
# Cloud test case ID: 261

test_case_id: 261
goal: Demonstrate reusable step templates
base_url: https://www.wikipedia.org

statements:
  # Direct action
  - intent: Enter "light" into the search field
    action: input_text
    locator: "getByRole('searchbox', { name: 'Search Wikipedia' })"
    text: "light"

  # In the cloud version, this is a template reference (id: 42)
  # For local, inline the template's steps: search and click
  - STEP: Search (template placeholder)
    statements:
      - intent: Click the search button
        action: click
        locator: "getByRole('button', { name: 'Search' })"

  # Another search with different keyword
  - intent: Enter "ship" into the search field
    action: input_text
    locator: "getByRole('searchbox', { name: 'Search Wikipedia' })"
    text: "ship"

  - VERIFY: The search input contains "ship"
