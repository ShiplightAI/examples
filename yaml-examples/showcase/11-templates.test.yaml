# 11 — Templates (Reusable Steps)
#
# Demonstrates reusable step templates that can be shared across
# tests. Templates avoid duplicating common sequences like
# "clear search field and verify".
#
# The template `clear-search-field.yaml` is referenced via the
# `template:` keyword — its statements are inlined at transpile time.
# Cloud test case ID: 261

test_case_id: 261
goal: Demonstrate reusable step templates
base_url: https://www.wikipedia.org

statements:
  - URL: /

  # Type "light" into search
  - intent: Enter "light" into the search field
    action: input_text
    locator: "getByRole('searchbox', { name: 'Search Wikipedia' })"
    text: "light"

  # Use the reusable template to clear the search field
  - template: ../templates/clear-search-field.yaml

  # Type "ship" into the now-empty search field
  - intent: Enter "ship" into the search field
    action: input_text
    locator: "getByRole('searchbox', { name: 'Search Wikipedia' })"
    text: "ship"

  - VERIFY: The search input contains "ship"
