# 02 — Context-Aware Verification (Step Memory)
#
# Demonstrates how Shiplight's AI agent remembers what happened in
# previous steps, so assertions can reference prior context without
# hardcoding values.
#
# In this test we search Wikipedia for "light", then verify the
# result page matches "the entered keyword" — without repeating
# the word "light". The agent knows what was typed because it
# remembers the earlier step.
#
# Cloud test case ID: 257

test_case_id: 257
goal: Demonstrate context-aware verification across steps
base_url: https://www.wikipedia.org/
statements:
  - URL: /
  
  # Type a search term — the agent remembers this value
  - intent: Enter "light" into the search field
    action: input_text
    locator: "getByRole('searchbox', { name: 'Search Wikipedia' })"
    text: "light"

  # Click search
  - intent: Click the search button to submit the query
    action: click
    locator: "getByRole('button', { name: 'Search' })"

  # Context-aware assertion: references "the entered keyword"
  # instead of hardcoding "light". The agent recalls step 1.
  - VERIFY: The page matches the entered keyword

  # Standard js assertion for the visual element
  - VERIFY: A triangular prism image is visible on the Light article
    js: "await expect(page.getByRole('figure', { name: 'A triangular prism dispersing' }).getByRole('link').first()).toBeVisible({ timeout: 5000 })"
