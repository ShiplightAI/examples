# 02 — Context-Aware Verification
#
# Demonstrates how Shiplight maintains context across steps.
#
# Traditional assertions are stateless — each VERIFY checks a
# hardcoded value. Shiplight's AI agent remembers what happened
# in previous steps, so assertions can reference prior context
# without repeating values.
#
# For example: "Verify the success message shows the name we entered"
# works without hardcoding the name — the agent knows what was typed.

