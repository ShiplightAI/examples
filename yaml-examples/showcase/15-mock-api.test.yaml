# 15 — Mock API Call
#
# Demonstrates calling a custom function to mock an API,
# then navigating to a page that consumes the mocked data.
#
# The function `mock_api_call` intercepts the fruits API and
# returns custom data. Uses `call:` syntax to invoke it.
# Cloud test case ID: 525

test_case_id: 525
goal: Demonstrate API mocking with a custom function
base_url: https://www.wikipedia.org

statements:
  - URL: /

  # Call the mock function to intercept the API
  - intent: Set up API mock for fruits endpoint
    call: "../helpers/mock_api_call.ts#mock_api_call"
    args: [page]

  # Navigate to the demo page that calls the mocked API
  - intent: Navigate to the API mocking demo page
    action: go_to_url
    url: "https://demo.playwright.dev/api-mocking"
