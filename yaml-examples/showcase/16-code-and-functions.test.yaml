# 16 — Code and Functions
#
# Demonstrates calling custom TypeScript functions from YAML tests
# and inline JavaScript code execution.
#
# The `call:` syntax invokes a function from a helper file.
# The `CODE:` shorthand runs inline JavaScript directly.
# Cloud test case ID: 258

test_case_id: 258
goal: Demonstrate custom functions and inline code
base_url: https://www.wikipedia.org

statements:
  - URL: /

  # Call a custom function to navigate
  - intent: Navigate to Google using custom function
    call: "../helpers/navigate_to.ts#navigate_to"
    args: [page, "https://www.google.com"]

  # Use inline CODE to go back
  - CODE: |
      await page.goBack({ timeout: 5000 });
      await page.waitForLoadState('load', { timeout: 5000 });
