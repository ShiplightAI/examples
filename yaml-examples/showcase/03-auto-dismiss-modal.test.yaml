# 03 — Auto-Dismiss Modal
#
# Demonstrates how Shiplight automatically dismisses intrusive
# popups that block the target element.
#
# The test page shows a modal overlay on load. The test instructs
# the agent to click a button behind the modal. The agent detects
# the obstruction, dismisses the modal, and retries the click —
# all without explicit handling in the test.
#
# Requires: auto_dismiss_modal setting (cloud feature)
# Cloud test case ID: 497

test_case_id: 497
goal: Demonstrate automatic modal dismissal
base_url: https://app.shiplight.ai
settings:
  auto_dismiss_modal: true

statements:
  - URL: /testing/modal/index.html

  # The page shows a modal on load. This action targets the button
  # behind it. The agent will auto-dismiss the modal first, then
  # click the button.
  - intent: Click the green button with text "Click Me After Modal Dismissed"
    action: click
    locator: "getByRole('button', { name: 'Click Me After Modal Dismissed' })"
