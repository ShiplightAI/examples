# 07 — Teardown and Navigation
# Demonstrates: teardown, go_back, URL shorthand, reload_page, save_variable

goal: Navigate through the site and clean up with teardown

statements:
  - URL: /inventory.html

  # save_variable — capture current URL
  - intent: Save the inventory URL
    action: save_variable
    name: inventory_url
    value: "js: page.url()"

  # Navigate to a product
  - intent: Click the first product name
    js: "await page.locator('.inventory_item_name').first().click()"

  - VERIFY: The product detail page is displayed
    js: "await expect(page.locator('.inventory_details_name')).toBeVisible()"

  # go_back
  - intent: Go back to inventory
    action: go_back

  - VERIFY: The inventory page is displayed
    js: "await expect(page.getByText('Products')).toBeVisible()"

  # go_to_url
  - URL: /cart.html

  - VERIFY: The cart page is displayed
    js: "await expect(page.getByText('Your Cart')).toBeVisible()"

  # reload via js: shorthand
  - intent: Reload the page
    js: "await page.reload({ waitUntil: 'domcontentloaded' })"

  - VERIFY: The cart page is still displayed after reload
    js: "await expect(page.getByText('Your Cart')).toBeVisible()"

  # verify — the AI agent has access to saved variables at runtime
  - VERIFY: The current page URL is different from the saved inventory_url

teardown:
  # Teardown runs even if the test fails — use it for cleanup
  - intent: Open the sidebar menu
    js: "await page.getByRole('button', { name: 'Open Menu' }).click()"

  - intent: Click Reset App State
    js: "await page.getByText('Reset App State').click()"
