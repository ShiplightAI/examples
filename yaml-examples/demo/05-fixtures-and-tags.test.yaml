# 05 — Fixtures and Tags
# Demonstrates: name (custom test name), tags, use (viewport, locale)

name: Mobile inventory browsing
tags:
  - smoke
  - mobile

use:
  viewport:
    width: 375
    height: 812
  locale: en-US

goal: Verify inventory works on a mobile viewport

statements:
  - URL: /inventory.html

  - VERIFY: The inventory page is displayed
    js: "await expect(page.getByText('Products')).toBeVisible({ timeout: 2000 })"

  - VERIFY: The product listings are visible on the page
    js: "await expect(page.locator('.inventory_item').first()).toBeVisible({ timeout: 2000 })"

  - intent: Add Sauce Labs Backpack to cart
    action: click
    locator: "getByRole('button', { name: 'Add to cart' }).first()"

  - intent: Click the shopping cart icon
    action: click
    locator: "locator('[data-test=\"shopping-cart-link\"]')"

  - VERIFY: The cart contains the selected product
    js: "await expect(page.locator('.cart_item')).toHaveCount(1, { timeout: 2000 })"
