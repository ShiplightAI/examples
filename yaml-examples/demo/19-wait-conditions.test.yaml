# 19 — Wait Conditions (WAIT_UNTIL / WAIT)
# Demonstrates: WAIT_UNTIL with a `js:` predicate (polled in-process, no model
# calls) vs. a natural-language condition (AI-checked), plus fixed-duration WAIT.
#
# Prefer `js:` WAIT_UNTIL for simple DOM/state checks — it is far cheaper and
# faster than an AI wait, which costs a model call on every poll. The predicate
# must RETURN truthy/falsy (a Playwright waitFor() resolves to undefined and
# never registers as met). Keep natural language for semantic conditions.

goal: Wait for page state using JS and natural-language conditions

statements:
  - URL: /inventory.html

  # js: WAIT_UNTIL — poll the DOM in-process until products render. No model call.
  - WAIT_UNTIL: "js: (await page.locator('.inventory_item').count()) > 0"
    timeout_seconds: 10

  - intent: Add Sauce Labs Backpack to cart
    action: click
    locator: "locator('[data-test=\"add-to-cart-sauce-labs-backpack\"]')"

  # js: WAIT_UNTIL — wait until the cart badge shows one item. No model call.
  # Predicate runs in-process (Node/Playwright), so use page.locator(), not
  # browser globals like `document` — see the js: wait above.
  - WAIT_UNTIL: "js: (await page.locator('[data-test=\"shopping-cart-badge\"]').count()) === 1 && (await page.locator('[data-test=\"shopping-cart-badge\"]').textContent()) === '1'"
    timeout_seconds: 5

  - intent: Open the cart
    action: click
    locator: "locator('[data-test=\"shopping-cart-link\"]')"

  # Natural-language WAIT_UNTIL — semantic, AI-checked (a model call per poll).
  # Use this form when there is no reliable selector or the check is semantic.
  - WAIT_UNTIL: The cart page lists the Sauce Labs Backpack
    timeout_seconds: 15

  - VERIFY: The cart shows exactly one item
    js: "await expect(page.locator('.cart_item')).toHaveCount(1, { timeout: 2000 })"
