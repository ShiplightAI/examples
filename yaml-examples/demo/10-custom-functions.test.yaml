# 10 — Custom Functions
# Demonstrates: call syntax for invoking TypeScript functions from YAML.
# Each value in args maps directly to a parameter in the function signature.

goal: Use custom functions to manage and verify the cart

statements:
  - URL: /inventory.html

  - intent: Add Sauce Labs Backpack to cart
    action: click
    locator: "locator('[data-test=\"add-to-cart-sauce-labs-backpack\"]')"

  - intent: Add Sauce Labs Bike Light to cart
    action: click
    locator: "locator('[data-test=\"add-to-cart-sauce-labs-bike-light\"]')"

  # System object: page is passed as the Playwright Page object
  - intent: Check the cart count with a custom function
    call: "../helpers/cart.ts#get_cart_count"
    args: [page]

  # Multiple arg types: system object, number literal, quoted string
  - intent: Verify cart has 2 items
    call: "../helpers/cart.ts#verify_cart_count"
    args: [page, 2, "Expected 2 items after adding backpack and bike light"]

  # Call clear_cart to remove all items
  - intent: Clear the cart using a custom function
    call: "../helpers/cart.ts#clear_cart"
    args: [page]

  # No args: functions that take no parameters
  # - intent: Run cleanup
  #   call: "../helpers/utils.ts#cleanup"

  # $variable: reads from the runtime variable store
  # - intent: Create user with saved email
  #   call: "../helpers/users.ts#createUser"
  #   args: [page, $savedEmail]

  - intent: Click the shopping cart icon
    action: click
    locator: "locator('[data-test=\"shopping-cart-link\"]')"

  - VERIFY: The cart is empty
    js: "await expect(page.locator('.cart_item')).toHaveCount(0, { timeout: 2000 })"
