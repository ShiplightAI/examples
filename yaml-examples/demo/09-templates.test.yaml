# 09 — Templates
# Demonstrates: template: with params
# Templates extract reusable flows into separate files.
# Params (<<first_name>>) are substituted at transpile time.

goal: Complete checkout using a reusable template

statements:
  - URL: /inventory.html

  - intent: Add Sauce Labs Backpack to cart
    js: "await page.getByRole('button', { name: 'Add to cart' }).first().click()"

  - intent: Click the shopping cart icon
    js: "await page.locator('[data-test=\"shopping-cart-link\"]').click()"

  - intent: Click the Checkout button
    js: "await page.getByRole('button', { name: 'Checkout' }).click()"

  - template: ../templates/checkout.yaml
    params:
      first_name: "Test"
      last_name: "User"
      zip_code: "90210"

  - VERIFY: The checkout overview page is displayed
    js: "await expect(page.getByText('Checkout: Overview')).toBeVisible()"

  - intent: Click the Finish button
    js: "await page.getByRole('button', { name: 'Finish' }).click()"

  - VERIFY: The order confirmation page is displayed
    js: "await expect(page.getByText('Thank you for your order')).toBeVisible()"
