# 06 — Variables
# Demonstrates: {{VAR_NAME}} in action kwargs
# Variables are defined in shiplight.config.json

goal: Use variables to fill checkout information

statements:
  - URL: /inventory.html

  - intent: Add Sauce Labs Backpack to cart
    action: click
    locator: "getByRole('button', { name: 'Add to cart' }).first()"

  - intent: Click the shopping cart icon
    action: click
    locator: "locator('[data-test=\"shopping-cart-link\"]')"

  - intent: Click the Checkout button
    action: click
    locator: "getByRole('button', { name: 'Checkout' })"

  # input_text — structured action with variable substitution
  - intent: Enter first name from variable
    action: input_text
    locator: "getByPlaceholder('First Name')"
    text: "{{SAUCE_USER}}"

  - intent: Enter last name
    action: input_text
    locator: "getByPlaceholder('Last Name')"
    text: "Tester"

  - intent: Enter zip code
    action: input_text
    locator: "getByPlaceholder('Zip/Postal Code')"
    text: "12345"

  - intent: Click Continue
    action: click
    locator: "getByRole('button', { name: 'Continue' })"

  - VERIFY: The checkout overview page is displayed
    js: "await expect(page.getByText('Checkout: Overview')).toBeVisible({ timeout: 2000 })"
