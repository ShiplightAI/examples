# 04 — Steps and Control Flow
# Demonstrates: STEP grouping, IF/ELSE with AI and js: conditions, WHILE loop

goal: Browse products with conditional logic

statements:
  - URL: /inventory.html

  - STEP: Add a product to the cart
    statements:
      - intent: Add Sauce Labs Backpack to cart
        action: click
        locator: "getByRole('button', { name: 'Add to cart' }).first()"
      - VERIFY: The shopping cart badge shows 1
        js: "await expect(page.locator('[data-test=\"shopping-cart-badge\"]')).toHaveText('1', { timeout: 2000 })"

  # IF with AI condition
  - IF: The shopping cart badge shows a number greater than 0
    THEN:
      - intent: Click the shopping cart icon
        action: click
        locator: "locator('[data-test=\"shopping-cart-link\"]')"
      - VERIFY: The cart page is displayed with items
        js: "await expect(page.locator('.cart_item')).toHaveCount(1, { timeout: 2000 })"
    ELSE:
      - VERIFY: This branch should not execute

  # IF with JavaScript condition
  - IF: "js: page.url().includes('/cart')"
    THEN:
      - STEP: Proceed to checkout
        statements:
          - intent: Click the Checkout button
            action: click
            locator: "getByRole('button', { name: 'Checkout' })"
          - VERIFY: The checkout information page is displayed
            js: "await expect(page.getByText('Checkout: Your Information')).toBeVisible({ timeout: 2000 })"
          - intent: Click the Cancel button
            action: click
            locator: "getByRole('button', { name: 'Cancel' })"
          - VERIFY: The cart page is displayed
            js: "await expect(page.getByText('Your Cart')).toBeVisible({ timeout: 2000 })"

  # WHILE loop with js: condition — best for counter/iteration logic where
  # fast evaluation matters. AI conditions (~5-10s each) would make this loop
  # too slow for 6 iterations. Reset cart first so all buttons are available.
  - URL: /inventory.html

  - intent: Remove Sauce Labs Backpack from cart
    action: click
    locator: "locator('[data-test=\"remove-sauce-labs-backpack\"]')"

  - WHILE: "js: (await page.locator('button:has-text(\"Add to cart\")').count()) > 0"
    DO:
      - intent: Click the first Add to cart button
        action: click
        locator: "locator('button:has-text(\"Add to cart\")').first()"
    timeout_ms: 30000

  - VERIFY: All 6 products are in the cart
    js: "await expect(page.locator('[data-test=\"shopping-cart-badge\"]')).toHaveText('6', { timeout: 2000 })"
