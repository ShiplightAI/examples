# 04 — Steps and Control Flow
# Demonstrates: STEP grouping, IF/ELSE with AI and js: conditions

goal: Browse products with conditional logic

statements:
  - URL: /inventory.html

  - STEP: Add a product to the cart
    statements:
      - desc: Add Sauce Labs Backpack to cart
        js: "await page.getByRole('button', { name: 'Add to cart' }).first().click()"
      - VERIFY: The shopping cart badge shows 1
        js: "await expect(page.locator('[data-test=\"shopping-cart-badge\"]')).toHaveText('1')"

  # IF with AI condition
  - IF: The shopping cart badge shows a number greater than 0
    THEN:
      - desc: Click the shopping cart icon
        js: "await page.locator('[data-test=\"shopping-cart-link\"]').click()"
      - VERIFY: The cart page is displayed with items
        js: "await expect(page.locator('.cart_item')).toHaveCount(1)"
    ELSE:
      - VERIFY: This branch should not execute

  # IF with JavaScript condition
  - IF: "js: page.url().includes('/cart')"
    THEN:
      - STEP: Proceed to checkout
        statements:
          - desc: Click the Checkout button
            js: "await page.getByRole('button', { name: 'Checkout' }).click()"
          - VERIFY: The checkout information page is displayed
            js: "await expect(page.getByText('Checkout: Your Information')).toBeVisible()"
          - desc: Click the Cancel button
            js: "await page.getByRole('button', { name: 'Cancel' }).click()"
          - VERIFY: The cart page is displayed
            js: "await expect(page.getByText('Your Cart')).toBeVisible()"
