# 03 — ACTION Statements
# Demonstrates: structured action syntax with locator/xpath, various action types
# Actions replay deterministically (~1s each) without AI interpretation.
# For simple click/hover/press, prefer the js: shorthand (see 01-basic).

goal: Add items to cart and verify using action entities

statements:
  - URL: /inventory.html

  # select_dropdown_option — structured action (no js: shorthand for this)
  - intent: Sort products by price low to high
    action: select_dropdown_option
    locator: "getByRole('combobox')"
    text: "Price (low to high)"

  - VERIFY: The first product has the lowest price

  # click with locator — structured syntax
  - intent: Add Sauce Labs Backpack to cart
    action: click
    locator: "locator('[data-test=\"add-to-cart-sauce-labs-backpack\"]')"

  # click with xpath — when no locator is available
  - intent: Add Sauce Labs Bike Light to cart
    action: click
    xpath: "//button[@id='add-to-cart-sauce-labs-bike-light']"

  # scroll
  - intent: Scroll down to see more products
    action: scroll
    down: true
    num_pages: 1

  - intent: Scroll back up to top
    action: scroll
    down: false
    num_pages: 1

  - VERIFY: The shopping cart badge shows the number 2
    js: "await expect(page.locator('[data-test=\"shopping-cart-badge\"]')).toHaveText('2')"

  # click — navigate to cart (js: shorthand for comparison)
  - intent: Click the shopping cart icon
    js: "await page.locator('[data-test=\"shopping-cart-link\"]').click()"

  - VERIFY: Sauce Labs Backpack and Sauce Labs Bike Light are in the cart
