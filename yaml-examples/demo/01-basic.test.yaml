goal: Verify the inventory page displays products
statements:
  - URL: /inventory.html

  - VERIFY: The inventory page is displayed with product listings
    js: "await expect(page.getByText('Products')).toBeVisible({ timeout: 2000 })"

  - intent: Click the first product name
    action: click
    locator: "locator('.inventory_item_name').first()"

  - VERIFY: The product detail page is displayed
    js: "await expect(page.locator('.inventory_details_name')).toBeVisible({ timeout: 2000 })"
