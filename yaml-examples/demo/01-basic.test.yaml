goal: Verify the inventory page displays products
statements:
  - URL: /inventory.html

  - VERIFY: The inventory page is displayed with product listings
    js: "await expect(page.getByText('Products')).toBeVisible()"

  - desc: Click the first product name
    js: "await page.locator('.inventory_item_name').first().click()"

  - VERIFY: The product detail page is displayed
    js: "await expect(page.locator('.inventory_details_name')).toBeVisible()"
