# 14 — CODE Statement
# Demonstrates: CODE shorthand for inline JavaScript
# Use CODE: for network mocking, localStorage manipulation,
# and other page-level scripting.

goal: Verify page renders correctly with mocked data and localStorage

statements:
  - URL: /inventory.html

  # Mock an API endpoint — multiline block scalar
  - CODE: |
      await page.route('**/api/users', (route) => route.fulfill({
        status: 200,
        contentType: 'application/json',
        body: JSON.stringify([
          { id: 1, name: 'Alice', role: 'Admin' },
          { id: 2, name: 'Bob', role: 'Editor' },
        ]),
      }));

  # Seed localStorage — single-line
  - CODE: "await page.evaluate(() => localStorage.setItem('feature_beta', 'true'))"

  # Reload to pick up mocked data and localStorage values
  - URL: /inventory.html

  - VERIFY: The inventory page is displayed
    js: "await expect(page.getByText('Products')).toBeVisible()"

  # Inline JS for quick assertions
  - CODE: |
      const title = await page.title();
      expect(title).toContain('Swag Labs');
