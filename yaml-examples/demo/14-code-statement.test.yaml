# 14 — Code Statement
# Demonstrates: description: + js: for inline JavaScript
# Use it for network mocking, localStorage manipulation, and other
# page-level scripting. Raw JS does not self-heal — if it fails, it fails.

goal: Verify page renders correctly with mocked data and localStorage

statements:
  - URL: /inventory.html

  # Mock an API endpoint — multiline block scalar
  - description: Mock the users API to return two users
    js: |
      await page.route('**/api/users', (route) => route.fulfill({
        status: 200,
        contentType: 'application/json',
        body: JSON.stringify([
          { id: 1, name: 'Alice', role: 'Admin' },
          { id: 2, name: 'Bob', role: 'Editor' },
        ]),
      }));

  # Seed localStorage — single-line
  - description: Seed a feature flag in localStorage
    js: "await page.evaluate(() => localStorage.setItem('feature_beta', 'true'))"

  # Reload to pick up mocked data and localStorage values
  - URL: /inventory.html

  - VERIFY: The inventory page is displayed
    js: "await expect(page.getByText('Products')).toBeVisible({ timeout: 2000 })"

  # Inline JS for quick assertions
  - description: Assert the page title contains Swag Labs
    js: |
      const title = await page.title();
      expect(title).toContain('Swag Labs');
