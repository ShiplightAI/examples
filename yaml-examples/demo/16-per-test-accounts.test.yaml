# 16 — Per-Test Auth
# Demonstrates: running a test with its own auth script (Case 3)
#
# Most tests use the shared account from the setup project (Case 1/2).
# When a test needs a different identity, it declares its own auth script
# and args. The fixture calls the script's login(args) function, which
# returns a storageState file path. Caching is the script's responsibility.

use:
  auth: ./demo/auth.login.ts
  args:
    username: problem_user
    password: secret_sauce

goal: Verify problem_user can access inventory

statements:
  - URL: /inventory.html

  - VERIFY: The inventory page shows products
    js: "await expect(page.getByText('Products')).toBeVisible({ timeout: 2000 })"

  - VERIFY: There are 6 products listed on the page
    js: "await expect(page.locator('.inventory_item')).toHaveCount(6, { timeout: 2000 })"
