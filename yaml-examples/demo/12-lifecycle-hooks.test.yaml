name: Cart Management Suite
tags: [e2e, hooks]

suite:
  serial: true
  url: https://www.saucedemo.com/inventory.html

  beforeAll:
    - description: Verify site is accessible
      action_entity:
        action_data:
          action_name: go_to_url
          kwargs:
            url: https://www.saucedemo.com/inventory.html

  beforeEach:
    - description: Add Sauce Labs Backpack to cart
      action_entity:
        locator: "locator('[data-test=\"add-to-cart-sauce-labs-backpack\"]')"
        action_data:
          action_name: click
          kwargs: {}

  afterEach:
    - description: Remove Backpack from cart if present
      action_entity:
        locator: "locator('[data-test=\"remove-sauce-labs-backpack\"]')"
        action_data:
          action_name: click
          kwargs: {}

  afterAll:
    - description: Verify we're back on inventory
      action_entity:
        action_data:
          action_name: go_to_url
          kwargs:
            url: https://www.saucedemo.com/inventory.html

  tests:
    - name: Verify cart badge shows item count
      statements:
        - "VERIFY: The shopping cart badge shows 1 item"

    - name: Verify remove button appears after adding to cart
      statements:
        - "VERIFY: A Remove button is visible for Sauce Labs Backpack"
