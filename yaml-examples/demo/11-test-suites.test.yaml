# 11 — Test Suites
# Demonstrates: suite with sequential execution, beforeEach hook, multiple tests,
# and per-test teardown for cleanup that runs even if the test fails.
# Navigation is explicit via URL shorthand in beforeEach.

name: Inventory Browsing Suite
tags: [smoke, suite]

suite:
  beforeEach:
    - URL: /inventory.html

  tests:
    - name: Sort products by price
      statements:
        # select_dropdown_option — structured action (no js: shorthand)
        - intent: Sort by price low to high
          action: select_dropdown_option
          locator: "getByRole('combobox')"
          text: "Price (low to high)"
        - VERIFY: Products are sorted by price ascending

    - name: View product details
      statements:
        - intent: Click the first product name
          js: "await page.locator('.inventory_item_name').first().click()"
        - VERIFY: The product detail page is displayed
          js: "await expect(page.locator('.inventory_details_name')).toBeVisible()"

    - name: Add product to cart
      statements:
        - intent: Click Add to cart on the first product
          js: "await page.locator('[name=\"add-to-cart-sauce-labs-backpack\"]').click()"
        - VERIFY: Cart badge shows 1 item
      # teardown runs in a finally block — even if the test fails, the cart is cleaned up.
      teardown:
        - intent: Remove the product from the cart
          js: "await page.locator('[name=\"remove-sauce-labs-backpack\"]').click()"
