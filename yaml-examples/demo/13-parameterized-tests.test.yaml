# 13 — Parameterized Tests
# Demonstrates: parameters with <<key>> substitution
# Each parameter set generates a separate test run, named "<test name> [<param name>]".
#
# Running a single parameter:
#   Each parameter name is also emitted as a Playwright tag (@<name>), so you
#   select one variant with --grep '@<name>':
#
#     npx shiplight test --grep '@backpack'       # run only the backpack variant
#     npx shiplight test --grep '@bike light'     # run only the bike light variant
#
#   Combine with the file path to scope to this file + one variant:
#     npx shiplight test demo/13-parameterized-tests.test.yaml --grep '@bike light'

name: Search and verify product
tags: [e2e, parameterized]
goal: Search for products and verify they are displayed
parameters:
  - name: backpack
    values:
      product_name: Sauce Labs Backpack
      expected_price: $29.99
  - name: bike light
    values:
      product_name: Sauce Labs Bike Light
      expected_price: $9.99
statements:
  - URL: /inventory.html

  - intent: Click the {{product_name}}
    action: ai_action
    use_pure_vision: false

  - VERIFY: "{{product_name}} is visible with price {{expected_price}}"
