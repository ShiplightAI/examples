# Reusable checkout template
# Params: first_name, last_name, zip_code

params:
  - first_name
  - last_name
  - zip_code

statements:
  - desc: Enter first name
    action: input_text
    locator: "getByPlaceholder('First Name')"
    text: "<<first_name>>"

  - desc: Enter last name
    action: input_text
    locator: "getByPlaceholder('Last Name')"
    text: "<<last_name>>"

  - desc: Enter zip code
    action: input_text
    locator: "getByPlaceholder('Zip/Postal Code')"
    text: "<<zip_code>>"

  - desc: Click Continue
    js: "await page.getByRole('button', { name: 'Continue' }).click()"
