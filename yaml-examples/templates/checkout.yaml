# Reusable checkout template
# Params: first_name, last_name, zip_code

params:
  - first_name
  - last_name
  - zip_code

statements:
  - action: input_text
    description: Enter first name
    locator: "getByPlaceholder('First Name')"
    text: "<<first_name>>"

  - action: input_text
    description: Enter last name
    locator: "getByPlaceholder('Last Name')"
    text: "<<last_name>>"

  - action: input_text
    description: Enter zip code
    locator: "getByPlaceholder('Zip/Postal Code')"
    text: "<<zip_code>>"

  - action: click
    description: Click Continue
    locator: "getByRole('button', { name: 'Continue' })"
