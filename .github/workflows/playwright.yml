name: Playwright Tests

on:
  push:
    branches: [main]
    paths:
      - "cicd-example/**"
  pull_request:
    branches: [main]
    paths:
      - "cicd-example/**"

permissions:
  pull-requests: write

jobs:
  playwright-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cicd-example

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: cicd-example/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Build
        run: pnpm build

      - name: Start server
        run: pnpm start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Post pending comment
        id: post-pending
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const MARKER = '<!-- playwright-ci -->';
            const body = [
              MARKER,
              '## Playwright Tests (CI)',
              '',
              '⏳ Tests are running…',
              '',
              `**Run:** [View workflow](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.setOutput('comment-id', existing.id);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.setOutput('comment-id', created.id);
            }

      - name: Run Playwright tests
        id: run-tests
        run: pnpm test
        continue-on-error: true
        env:
          CI: true
          SHIPLIGHT_API_KEY: ${{ secrets.SHIPLIGHT_API_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: cicd-example/playwright-report/
          retention-days: 30

      - name: Update PR comment with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const passed = '${{ steps.run-tests.outcome }}' === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}#artifacts`;

            const MARKER = '<!-- playwright-ci -->';
            const status = passed ? '✅ All tests passed' : '❌ Tests failed';

            const body = [
              MARKER,
              '## Playwright Tests (CI)',
              '',
              status,
              '',
              `**Run:** [View workflow](${runUrl})`,
              `**Report:** [Download artifact](${artifactUrl})`,
            ].join('\n');

            const commentId = '${{ steps.post-pending.outputs.comment-id }}';
            if (commentId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(commentId),
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Fail job if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1
