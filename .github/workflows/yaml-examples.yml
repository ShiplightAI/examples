name: YAML Examples Tests

on:
  push:
    branches: [main]
    paths:
      - 'yaml-examples/**'
  pull_request:
    branches: [main]
    paths:
      - 'yaml-examples/**'
  workflow_dispatch: {}

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E demo tests
    runs-on: shiplight-medium
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        working-directory: yaml-examples
        run: npm install

      - name: Run demo tests
        id: tests
        continue-on-error: true
        working-directory: yaml-examples
        run: npx shiplight test --project demo

      - name: Upload results to Shiplight
        if: always() && steps.tests.outcome != 'skipped'
        working-directory: yaml-examples
        run: npx shiplight report

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          if-no-files-found: ignore
          path: |
            yaml-examples/shiplight-report
            yaml-examples/test-results

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
