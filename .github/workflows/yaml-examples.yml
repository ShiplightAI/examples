name: YAML Examples Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'yaml-examples/**'
  pull_request:
    branches: [main]
    paths:
      - 'yaml-examples/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: yaml-examples

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run demo tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx shiplight test --project demo
