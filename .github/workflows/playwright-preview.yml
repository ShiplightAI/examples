name: Playwright Tests (Vercel Preview)

on:
  deployment_status:

jobs:
  playwright-preview:
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Preview'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cicd-example

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: cicd-example/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Find PR number
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.payload.deployment.sha,
            });
            const pr = pulls.find(p => p.state === 'open');
            return pr ? pr.number : null;

      - name: Post pending comment
        if: steps.find-pr.outputs.result != 'null'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.find-pr.outputs.result }};
            const previewUrl = '${{ github.event.deployment_status.environment_url }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const MARKER = '<!-- playwright-preview -->';
            const body = [
              MARKER,
              '## Playwright Tests (Preview)',
              '',
              '⏳ Tests are running against the preview deployment…',
              '',
              `**Preview URL:** ${previewUrl}`,
              `**Run:** [View workflow](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.setOutput('comment-id', existing.id);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.setOutput('comment-id', created.id);
            }

      - name: Run Playwright tests
        id: run-tests
        run: pnpm test
        continue-on-error: true
        env:
          CI: true
          SHIPLIGHT_API_KEY: ${{ secrets.SHIPLIGHT_API_KEY }}
          BASE_URL: ${{ github.event.deployment_status.environment_url }}

      - name: Upload Playwright report
        id: upload-report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-preview
          path: cicd-example/playwright-report/
          retention-days: 30

      - name: Update PR comment with results
        if: steps.find-pr.outputs.result != 'null'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.find-pr.outputs.result }};
            const passed = '${{ steps.run-tests.outcome }}' === 'success';
            const previewUrl = '${{ github.event.deployment_status.environment_url }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}#artifacts`;

            const MARKER = '<!-- playwright-preview -->';
            const status = passed ? '✅ All tests passed' : '❌ Tests failed';

            const body = [
              MARKER,
              '## Playwright Tests (Preview)',
              '',
              status,
              '',
              `**Preview URL:** ${previewUrl}`,
              `**Run:** [View workflow](${runUrl})`,
              `**Report:** [Download artifact](${artifactUrl})`,
            ].join('\n');

            const commentId = '${{ steps.post-pending.outputs.comment-id }}';
            if (commentId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(commentId),
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Fail job if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1
